<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gaussian Splat Viewer</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 100%;
      height: 100vh;
      background: #1a1a1a;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #canvas {
      flex: 1;
      width: 100%;
      height: 100%;
      display: block;
    }

    .loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #fff;
      text-align: center;
      pointer-events: none;
      z-index: 10;
    }

    .loading h2 {
      font-size: 24px;
      margin-bottom: 12px;
    }

    .loading p {
      font-size: 14px;
      opacity: 0.7;
    }

    .spinner {
      border: 3px solid rgba(255, 255, 255, 0.2);
      border-top: 3px solid #fff;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .error {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(220, 38, 38, 0.9);
      color: #fff;
      padding: 24px;
      border-radius: 8px;
      max-width: 600px;
      text-align: center;
      z-index: 10;
      font-size: 14px;
      line-height: 1.5;
    }

    .error h2 {
      margin-bottom: 12px;
      font-size: 20px;
    }

    .controls {
      position: absolute;
      bottom: 20px;
      right: 20px;
      background: rgba(0, 0, 0, 0.6);
      color: #fff;
      padding: 12px 16px;
      border-radius: 6px;
      font-size: 12px;
      line-height: 1.6;
      z-index: 5;
    }

    .controls strong {
      display: block;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  
  <div id="loading" class="loading">
    <div class="spinner"></div>
    <h2>Loading Splat...</h2>
    <p>Fetching and rendering your 3D model</p>
  </div>

  <div id="error" class="error" style="display: none;">
    <h2>Error Loading Splat</h2>
    <p id="error-message"></p>
  </div>

  <div class="controls">
    <strong>Controls</strong>
    <div>🖱️ Drag to rotate</div>
    <div>🔄 Scroll to zoom</div>
  </div>

  <script src="https://unpkg.com/three@r128/build/three.min.js"></script>

  <script>
    function init() {
      const canvas = document.getElementById('canvas');
      const loadingEl = document.getElementById('loading');
      const errorEl = document.getElementById('error');
      const errorMsg = document.getElementById('error-message');

      // Check if THREE is available
      if (typeof THREE === 'undefined') {
        errorMsg.textContent = 'Failed to load Three.js library from CDN';
        loadingEl.style.display = 'none';
        errorEl.style.display = 'block';
        return;
      }

      try {
        // Get the URL from query parameters
        const params = new URLSearchParams(window.location.search);
        const splatUrl = params.get('url');

        if (!splatUrl) {
          throw new Error('No splat URL provided. Use ?url=<your-splat-url>');
        }

        console.log('Splat URL:', splatUrl);

        // Setup scene
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a1a);

        const camera = new THREE.PerspectiveCamera(
          75, 
          window.innerWidth / window.innerHeight, 
          0.1, 
          1000
        );
        camera.position.z = 2;

        const renderer = new THREE.WebGLRenderer({ 
          canvas: canvas, 
          antialias: true,
          alpha: false 
        });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio || 1);

        // Create a simple test geometry first
        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array([
          -0.5, -0.5, 0,
           0.5, -0.5, 0,
           0, 0.5, 0
        ]);
        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        
        const material = new THREE.PointsMaterial({ 
          color: 0x00ff00,
          size: 0.1,
          sizeAttenuation: true
        });

        const points = new THREE.Points(geometry, material);
        scene.add(points);

        // Fetch splat file in background
        fetch(splatUrl)
          .then(response => {
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            return response.arrayBuffer();
          })
          .then(arrayBuffer => {
            console.log('Splat file loaded:', (arrayBuffer.byteLength / 1024 / 1024).toFixed(2), 'MB');
          })
          .catch(error => {
            console.error('Failed to fetch splat:', error.message);
          });

        // Mouse controls
        let isDragging = false;
        let previousMousePosition = { x: 0, y: 0 };

        canvas.addEventListener('mousedown', (e) => {
          isDragging = true;
          previousMousePosition = { x: e.clientX, y: e.clientY };
        });

        canvas.addEventListener('mousemove', (e) => {
          if (isDragging) {
            const deltaX = e.clientX - previousMousePosition.x;
            const deltaY = e.clientY - previousMousePosition.y;

            points.rotation.y += deltaX * 0.01;
            points.rotation.x += deltaY * 0.01;

            previousMousePosition = { x: e.clientX, y: e.clientY };
          }
        });

        canvas.addEventListener('mouseup', () => {
          isDragging = false;
        });

        canvas.addEventListener('wheel', (e) => {
          e.preventDefault();
          camera.position.z += e.deltaY * 0.001;
          camera.position.z = Math.max(0.5, Math.min(10, camera.position.z));
        });

        // Handle window resize
        window.addEventListener('resize', () => {
          camera.aspect = window.innerWidth / window.innerHeight;
          camera.updateProjectionMatrix();
          renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Animation loop
        function animate() {
          requestAnimationFrame(animate);
          renderer.render(scene, camera);
        }

        loadingEl.style.display = 'none';
        console.log('Splat viewer initialized');
        animate();

      } catch (error) {
        console.error('Error:', error);
        loadingEl.style.display = 'none';
        errorEl.style.display = 'block';
        errorMsg.textContent = error.message || 'Unknown error occurred';
      }
    }

    // Call init after a short delay to ensure THREE loads
    window.addEventListener('load', init);
  </script>
</body>
</html>
